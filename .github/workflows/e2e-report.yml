name: E2E Tests Report

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  run-e2e-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Run E2E Tests
        run: |
          node scripts/runApiChecks.cjs || node scripts/runApiChecks.js

      - name: Upload Reports Artifact
        uses: actions/upload-artifact@v4
        with:
          name: e2e-reports
          path: reports/
          retention-days: 14

      - name: Commit Reports to Repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/
          git diff-index --quiet HEAD || git commit -m "chore: update e2e reports" && git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
