name: Build & Release APK

on:
  push:
    branches:
      - main
      - master

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout code ────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up JDK 17 ────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 3. Write google-services.json from secret ────────────────────────────
      - name: Write google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode > app/google-services.json

      # ── 4. Write keystore from secret ────────────────────────────────────────
      - name: Write keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/concept60.jks

      # ── 5. Make gradlew executable ───────────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # ── 6. Build signed release APK ──────────────────────────────────────────
      - name: Build release APK
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      # ── 7. Upload APK as workflow artifact (always available) ────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: concept60-release-${{ github.run_number }}
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      # ── 8. Create a GitHub Release with the APK attached ─────────────────────
      - name: Get short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Build #${{ github.run_number }} (${{ steps.sha.outputs.short }})"
          body: |
            Automated release from commit `${{ github.sha }}`
            Branch: `${{ github.ref_name }}`
          files: app/build/outputs/apk/release/app-release.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
