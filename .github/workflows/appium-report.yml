name: Appium Vulnerability Report

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  run-appium-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install Appium-Python-Client openpyxl

      - name: Setup Node.js & Appium
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Appium
        run: |
          npm install -g appium
          appium driver install uiautomator2

      - name: Run Appium Tests
        run: |
          # The script will decouple report generation from Appium connectivity if ADB is not present
          python run_appium_tests.py
        
      - name: Upload Reports Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vulnerability-reports
          path: "vulnerability test/"
          retention-days: 14

      - name: Commit Reports to Repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "vulnerability test/"
          git diff-index --quiet HEAD || git commit -m "chore: update appium vulnerability reports" && git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
